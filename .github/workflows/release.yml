name: Release (Beta)

on:
  push:
    branches:
      - 'release/v*'
      - 'hotfix/v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build number scheme: seconds since 2025-01-01 UTC. Gives a value that
  # (a) is always strictly increasing across release.yml and production.yml
  # runs because production always fires after release, (b) is identical
  # for the iOS and Android jobs in the same workflow run (both read this
  # job's output), and (c) fits int32 for Play's versionCode ceiling
  # (headroom until ~2093). github.run_number can't be used here because
  # each workflow has its own counter — release and production would
  # collide on first tag push.
  compute-build-number:
    name: Compute shared build number
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.calc.outputs.build }}
    steps:
      - id: calc
        run: |
          BUILD=$(( $(date -u +%s) - 1735689600 ))
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "Build number for this run: ${BUILD}"

  deploy-ios-testflight:
    name: iOS → TestFlight
    needs: compute-build-number
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s $(ls -d /Applications/Xcode_26*.app | head -1)

      # macos-latest rolled to the macOS 26 image (2026-06-23), whose Xcode 26
      # ships without the iOS platform SDK pre-installed, so `flutter build ipa`
      # fails with "iOS 26.0 is not installed. Please download and install the
      # platform from Xcode > Settings > Components." Download it explicitly.
      #
      # `xcodebuild -downloadPlatform iOS` is flaky on GitHub's macOS runners —
      # it fails ~40% of the time with "Unable to connect to simulator" (exit 70)
      # during the post-download simulator handshake even though the SDK content
      # downloads fine. Open upstream issue with no fix yet
      # (actions/runner-images#13459, #12763), so retry before giving up.
      - name: Ensure iOS platform SDK is installed
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::Download iOS platform (attempt ${attempt}/5)"
            if xcodebuild -downloadPlatform iOS; then
              echo "::endgroup::"
              echo "iOS platform SDK installed on attempt ${attempt}."
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt ${attempt} failed ('Unable to connect to simulator'); retrying in 15s..."
            sleep 15
          done
          echo "iOS platform download failed after 5 attempts." >&2
          exit 1

      - uses: ./.github/actions/setup-flutter
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          maptiler-api-key: ${{ secrets.MAPTILER_API_KEY }}

      - name: Stamp version (semver from pubspec + shared build number)
        env:
          BUILD: ${{ needs.compute-build-number.outputs.build }}
        run: |
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          sed -i.bak "s/^version:.*/version: ${SEMVER}+${BUILD}/" pubspec.yaml
          echo "Stamped: $(grep '^version:' pubspec.yaml)"

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_PASSWORD }}

      - name: Import provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | \
            base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build IPA (SHOW_DEBUG_UI=true for beta)
        run: flutter build ipa --release --dart-define=SHOW_DEBUG_UI=true --export-options-plist=ios/ExportOptions.plist

      # Upload via altool directly rather than apple-actions/upload-testflight-build@v3.
      # The action swallowed altool's non-zero exit: a missing/expired App Store
      # Connect agreement made altool fail with HTTP 403, yet the step (and the
      # whole release run) reported success and nothing reached TestFlight. A bare
      # `run:` uses `bash -eo pipefail`, so a non-zero altool exit fails the job.
      # altool reads the API key from ~/.appstoreconnect/private_keys/AuthKey_<id>.p8.
      # (The v3 action also no longer accepts `release-notes`; TestFlight "What's
      # New" is set in App Store Connect. Play still gets notes via whatsNewDirectory.)
      - name: Upload to TestFlight (altool — fails the job on error)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_PRIVATE_KEY" \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app --type ios \
            --file build/ios/ipa/ccwmap.ipa \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

  deploy-android-internal:
    name: Android → Play Internal
    needs: compute-build-number
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: ./.github/actions/setup-flutter
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          maptiler-api-key: ${{ secrets.MAPTILER_API_KEY }}

      - name: Stamp version (semver from pubspec + shared build number)
        env:
          BUILD: ${{ needs.compute-build-number.outputs.build }}
        run: |
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          sed -i.bak "s/^version:.*/version: ${SEMVER}+${BUILD}/" pubspec.yaml
          echo "Stamped: $(grep '^version:' pubspec.yaml)"

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Build AAB (SHOW_DEBUG_UI=true for beta)
        env:
          ANDROID_KEYSTORE_PATH: app/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release --dart-define=SHOW_DEBUG_UI=true

      - name: Authenticate with Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'
          access_token_lifetime: '3600s'

      - name: Upload to Play Internal
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          packageName: com.ccwmap.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: release_notes

  create-draft-release:
    name: Create/update draft GitHub Release
    needs: [compute-build-number, deploy-ios-testflight, deploy-android-internal]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version tag from branch name
        id: ver
        run: |
          # release/v0.3.0 -> v0.3.0 ; hotfix/v0.3.1 -> v0.3.1
          TAG="${GITHUB_REF_NAME#release/}"
          TAG="${TAG#hotfix/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          BUILD: ${{ needs.compute-build-number.outputs.build }}
          SHA: ${{ github.sha }}
        run: |
          BODY="Testing in TestFlight (build ${BUILD}) and Play Internal (build ${BUILD}). Tag this commit \`${TAG}\` after beta verification to promote to production."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes "$BODY" --target "$SHA" --draft=true
          else
            gh release create "$TAG" --draft --title "$TAG" --notes "$BODY" --target "$SHA"
          fi
