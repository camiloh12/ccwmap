name: Weekly Scans

on:
  schedule:
    - cron: '0 13 * * 1'  # Mondays 13:00 UTC = 09:00 ET
  workflow_dispatch: {}

concurrency:
  group: weekly-scans
  cancel-in-progress: false

jobs:
  dep-vuln-scan:
    name: OSV dependency scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: OSV scanner
        id: scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          # Recursively auto-discover every committed lockfile (pubspec.lock,
          # importer/uv.lock, and ios/Podfile.lock if it ever lands). We do NOT
          # reference ios/Podfile.lock explicitly: it is not committed (Flutter
          # generates it during the macOS iOS build), and osv-scanner aborts the
          # whole run when an explicit --lockfile path is missing — which is what
          # made this job fail every week and file false-positive security issues.
          scan-args: -r .
        continue-on-error: true
      - name: Open GitHub issue on failure
        if: steps.scan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const titlePrefix = 'Weekly dep-vuln-scan failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            // Dedupe: only open a new issue if there's no existing open one
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open label:security "${titlePrefix}"`,
            });
            if (existing.data.total_count > 0) {
              core.info(`Existing open security issue found (#${existing.data.items[0].number}); skipping duplicate.`);
              return;
            }
            const title = `${titlePrefix} (${new Date().toISOString().slice(0,10)})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['security'],
              body: `The OSV dependency scan exited non-zero. That means **either** known vulnerabilities were found in a committed lockfile (pubspec.lock / importer/uv.lock), **or** the scan itself errored (e.g. a referenced lockfile path is missing). Open the run log to see which.\n\nFailing run: ${runUrl}\n\nTriage:\n1. Click the run link above and open the "OSV scanner" step log.\n2. If vulnerabilities: identify affected packages + severity, then bump via a \`chore/deps-*\` branch (or document why we're deferring).\n3. If a scan error: fix the scan config (e.g. a missing/renamed lockfile path) rather than treating it as a vuln.`,
            });

  codeql-kotlin:
    name: CodeQL (Kotlin)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
      - uses: ./.github/actions/setup-flutter
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          maptiler-api-key: ${{ secrets.MAPTILER_API_KEY }}
      - name: Build Android (for CodeQL to observe)
        run: flutter build apk --debug
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:java-kotlin'
